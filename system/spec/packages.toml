package_manager = "pacman"
pkg             = "lazygit"

[packages.starship]
description     = "Cross-shell prompt"
priority        = "high"
package_manager = "pacman"
pkg             = "starship"

[packages.btop]
description     = "Resource monitor"
priority        = "high"
package_manager = "pacman"
pkg             = "btop"

[packages.fastfetch]
description     = "System information display tool"
priority        = "high"
package_manager = "pacman"
pkg             = "fastfetch"

[packages.man-pages]
description     = "Linux man pages"
priority        = "high"
package_manager = "pacman"
pkg             = "man-pages"

[packages.man-db]
