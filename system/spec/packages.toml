[packages.unzip]
description     = "Extraction utility for zip archives"
priority        = "high"
package_manager = "pacman"
pkg             = "unzip"

[packages.nodejs]
description     = "JavaScript runtime"
priority        = "high"
package_manager = "pacman"
pkg             = "nodejs"

