# ============================================================
# Base packages — installed on every platform, prerequisite
# tooling. git and yq are handled by the README bootstrap step
# and are not listed here.
# ============================================================

[packages.base-devel]
description     = "Base development tools meta-package"
priority        = "high"
package_manager = "pacman"
pkg             = "base-devel"

[packages.git]
description     = "Distributed version control system"
priority        = "high"
package_manager = "pacman"
pkg             = "git"

[packages.go]
description     = "Go programming language toolchain"
priority        = "high"
package_manager = "pacman"
pkg             = "go"

[packages.gcc]
description     = "GNU C/C++ compiler"
priority        = "high"
package_manager = "pacman"
pkg             = "gcc"

[packages.make]
description     = "GNU make build tool"
priority        = "high"
package_manager = "pacman"
pkg             = "make"

[packages.fd]
description     = "User-friendly alternative to find"
priority        = "high"
package_manager = "pacman"
pkg             = "fd"

[packages.ripgrep]
description     = "Fast recursive grep tool"
priority        = "high"
package_manager = "pacman"
pkg             = "ripgrep"

[packages.fzf]
description     = "Command-line fuzzy finder"
priority        = "high"
package_manager = "pacman"
pkg             = "fzf"

[packages.github-cli]
