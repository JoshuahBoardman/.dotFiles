# Symlink definitions for dotfiles deployment.
#
# Fields:
#   src      — path relative to dotfiles root (file or directory)
#   dest     — destination path (~ and $ENV_VAR expanded at runtime)
#   platforms — optional list; if absent applies to all platforms
#               valid values: "arch", "wsl", "mac", "windows"
#   method   — optional; "symlink" (default) or "copy"
#   elevated — optional; if true, operations run with sudo
#
# Directories: each file inside src is linked individually into dest,
# preserving relative paths. Existing untracked files in dest are left alone.
# Files: symlinked directly to dest.

# ============================================================
# Home configs
# ============================================================

[[symlinks.links]]
src  = "configs/claude"
dest = "~/.claude"

[[symlinks.links]]
src  = "configs/nvim"
dest = "~/.config/nvim"

[[symlinks.links]]
src  = "configs/hypr"
dest = "~/.config/hypr"

[[symlinks.links]]
src  = "configs/waybar"
dest = "~/.config/waybar"

[[symlinks.links]]
src  = "configs/kanshi"
dest = "~/.config/kanshi"

[[symlinks.links]]
src  = "configs/ghostty"
dest = "~/.config/ghostty"

[[symlinks.links]]
src  = "configs/wofi"
dest = "~/.config/wofi"

[[symlinks.links]]
src  = "configs/zellij"
dest = "~/.config/zellij"

[[symlinks.links]]
src  = "configs/lazygit"
dest = "~/.config/lazygit"

[[symlinks.links]]
src  = "configs/starship.toml"
dest = "~/.config/starship.toml"

[[symlinks.links]]
src  = "configs/local-bin"
dest = "~/.local/bin"

[[symlinks.links]]
src  = "configs/tmux.conf"
dest = "~/.tmux.conf"

[[symlinks.links]]
src  = "configs/bash_profile"
dest = "~/.bash_profile"

[[symlinks.links]]
src  = "configs/bashrc"
dest = "~/.bashrc"

# ============================================================
# System configs (require elevated permissions)
# ============================================================

[[symlinks.links]]
src      = "configs/ly"
dest     = "/etc/ly"
elevated = true

[[symlinks.links]]
src      = "configs/locale.conf"
dest     = "/etc/locale.conf"
elevated = true

[[symlinks.links]]
src      = "configs/locale.gen"
dest     = "/etc/locale.gen"
elevated = true
